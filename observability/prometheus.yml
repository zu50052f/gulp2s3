global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: blob-stream-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080

  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets:
          - jaeger:14269
